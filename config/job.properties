# job.properties — Hadoop MapReduce Pipeline Configuration
# Generated: 2026-04-22

# ============================================================
# PATHS
# ============================================================
# Full flight input (>1 GB)
task2.input.path=data_hub/csv/full_input.csv

# Route reference / distributed cache
task2.cache.path=data_hub/csv/cache_full.csv

# Task 18 attendance input
task18.input.path=data_hub/csv/attendance_full.csv

# Output directories
task2.output.path=outputs/task2_results.txt
task18.output.path=outputs/task18_results.txt

# For Hadoop cluster runs:
# hdfs.task2.input=hdfs:///user/ahmed/bd_project/flights/full_input.csv
# hdfs.task2.cache=hdfs:///user/ahmed/bd_project/cache/cache_full.csv
# hdfs.task18.input=hdfs:///user/ahmed/bd_project/attendance/attendance_full.csv
# hdfs.output.dir=hdfs:///user/ahmed/bd_project/output/

# ============================================================
# TASK 2 — Flight Route Enrichment
# ============================================================
task2.num.reducers=1
task2.job.name=FlightRouteEnrichment
# Mapper output: (routeLabel, revenue|passengerCount)
# Reducer output: routeLabel \t totalRevenue \t totalPassengers

# ============================================================
# TASK 18 — Time Slot Partitioning
# ============================================================
task18.num.reducers=3
task18.job.name=TimeSlotAttendance
# Partition assignments:
#   Morning   -> reducer 0
#   Afternoon -> reducer 1
#   Evening   -> reducer 2
# Reducer output: <slot> \t Present: <count>

# ============================================================
# HADOOP CLUSTER SETTINGS (override for cluster deployment)
# ============================================================
mapreduce.framework.name=local
mapreduce.job.reduces=1
yarn.resourcemanager.address=localhost:8032
fs.defaultFS=hdfs://localhost:9000

# Memory tuning for 1GB+ input files:
mapreduce.map.memory.mb=2048
mapreduce.reduce.memory.mb=2048
mapreduce.map.java.opts=-Xmx1536m
mapreduce.reduce.java.opts=-Xmx1536m
